en the customer chooses the Gamepass delivery method, they assume responsibility for keeping the pass available throughout processing. In particular, they agree to:\",\"items\":[\"Not deleting the Gamepass during order processing\",\"Not changing the Gamepass price\",\"Not modifying the Gamepass description\",\"Not deleting the experience associated with the Gamepass\"],\"consequenceLabel\":\"Consequence:\",\"consequence\":\"If the customer modifies, deletes, or alters any aspect of the Gamepass while the order is being processed, the order will be deemed delivered as agreed and no refund will be issued for that reason.\"},\"s4\":{\"title\":\"4. Refunds\",\"acceptTitle\":\"Refunds are accepted if:\",\"acceptItems\":[\"The product was not delivered within the maximum timeframe of the chosen method (excluding delays due to external causes)\",\"There was a verifiable error on the part of our team\",\"The payment was accidentally duplicated\"],\"rejectTitle\":\"Refunds do not apply if:\",\"rejectItems\":[\"The user incorrectly provided their Roblox username\",\"The product has already been delivered\",\"Breach of these Terms and Conditions\",\"General delays due to lack of stock\",\"Customer modifications to Gamepass delivery orders (per section 3)\",\"Customer absence in In-Game orders (per section 5)\",\"The customer purchased via Group method and does not meet the 14-day group membership requirement to be eligible for payout, or did not join the alternative groups offered when the main group ran out of stock\",\"Delivery could not be completed due to causes attributable to the customer, including but not limited to lack of response, absence at the time of delivery, incorrect data, or non-compliance with the communicated instructions\"],\"deadlineLabel\":\"Refund request deadline:\",\"deadline\":\"Any refund request must be submitted within thirty (30) calendar days following the date of order confirmation. Requests submitted outside this period may be dismissed, unless applicable law establishes a longer period.\",\"resolutionLabel\":\"Resolution time:\",\"resolutionTime\":\"15 minutes to 48 hours.\",\"methodLabel\":\"Refund method:\",\"method\":\"Refunds will preferably be issued as PEEK STORE internal balance (PEEK wallet), usable for future purchases on the store. However, where a mandatory consumer protection rule of the customer's country of residence, a financial institution, or the payment gateway so requires, the refund may be issued through the same payment method used by the customer. PEEK STORE will evaluate each case in accordance with applicable law and the specific conditions of the order.\"},\"s5\":{\"title\":\"5. Customer Absence in In-Game Orders\",\"p1\":\"For orders requiring In-Game delivery, the customer must be available to receive the delivery within a reasonable period of\",\"p1Strong\":\"72 hours\",\"p1End\":\"from order confirmation.\",\"warning\":\"If the customer does not respond through our official channels for more than seven (7) days from order confirmation, the order will be automatically refunded as PEEK STORE internal balance (PEEK wallet), usable for future purchases on the store.\",\"natureLabel\":\"Nature of the In-Game service:\",\"nature\":\"In-Game orders are digital services that require the active participation of the customer to be completed. The inability to complete the delivery due to lack of availability, response, or cooperation from the customer does not constitute a breach by PEEK STORE.\"},\"s6\":{\"title\":\"6. Protection Against Misuse of Refunds and Chargebacks\",\"intro\":\"PEEK STORE reserves the right to treat as fraud any attempt at:\",\"items\":[\"False or unfounded chargebacks\",\"Disputes without a legitimate basis\",\"Abusive or systematic misuse of the refund system\"],\"consequenceIntro\":\"If such practices are detected, PEEK STORE may:\",\"consequenceItems\":[\"Submit evidence to the payment gateway\",\"Permanently block the account\",\"Withhold related internal balance\",\"Report to authorities if necessary\"]},\"s7\":{\"title\":\"7. Disclaimer for Roblox Actions or Sanctions\",\"p1\":\"PEEK STORE is not responsible for any sanction, restriction, blocking, withholding of Robux, group or experience moderation, or any other action that Roblox Corporation may apply to the customer's account. Roblox®, the Roblox logo, and Robux® are registered trademarks of Roblox Corporation, an entity with which PEEK DIGITAL LLC has no commercial relationship, license agreement, or sponsorship arrangement. Any reference to such trademarks is made under nominative fair use for descriptive purposes only.\",\"warning\":\"These risks depend exclusively on Roblox Corporation's policies and decisions and are not under PEEK STORE's control. The customer accepts that they use our services at their own risk and assume full responsibility for the consequences of Roblox's actions.\"},\"s8\":{\"title\":\"8. Policy for Referrals, Affiliates, and Influencers\",\"intro\":\"Referral, affiliate, and content creator programs are subject to the following conditions:\",\"conditions\":[\"All commissions and benefits are subject to verification of legitimate activity\",\"The use of bots, fake visits, self-purchases, fraudulent clicks, or any other form of system manipulation is strictly prohibited\",\"PEEK STORE reserves the right to verify the legitimacy of all references and transactions\"],\"abuseIntro\":\"If abuse, manipulation, or fraudulent activity is detected, PEEK STORE may:\",\"abuseItems\":[\"Immediately cancel the referral/affiliate program\",\"Remove all accumulated benefits\",\"Permanently ban the user\",\"Withhold balance related to fraudulent activity\"]},\"s9\":{\"title\":\"9. Payment Methods\",\"intro\":\"We accept payments through the following certified processors, whose availability may vary depending on country, order type, or operational decisions of PEEK STORE:\",\"methods\":[\"Credit and debit cards (Visa, Mastercard, American Express) — via Stripe\",\"PayPal\",\"Mercado Pago and associated local methods (PSE, Nequi, Daviplata, Bancolombia, OXXO, SPEI, Yape, BCP, PIX, bank transfers and QR payments depending on country)\",\"Cryptocurrencies (BTC, ETH, USDT, USDC and others) — via Cryptomus and NowPayments\"],\"availabilityLabel\":\"Availability:\",\"availability\":\"The list of available methods may be updated without prior notice based on each processor's operations, local regulations, and internal decisions. PEEK STORE does not store full card data; processing is performed directly by the certified gateways.\",\"warning\":\"Payments through unauthorized channels are not accepted. Any attempt to pay outside official channels may result in order cancellation without refund.\"},\"s10\":{\"title\":\"10. Customer Data\",\"p1\":\"The customer is responsible for correctly providing their Roblox username, verifying their order before confirming it, and attaching payment receipts when required.\",\"p1Strong\":\"There are no refunds for customer errors in the data provided.\",\"disclaimerLabel\":\"Disclaimer regarding customer failures:\",\"disclaimer\":\"PEEK STORE is not responsible if the customer does not check notifications, emails, messages, or instructions sent through our official channels. If a customer provides another email address, does not check their SPAM folder for the invoice, or does not attend to the communications sent, it is not PEEK STORE's responsibility.\"},\"s11\":{\"title\":\"11. Cookies and Third-Party Credentials\",\"p1\":\"If the customer voluntarily provides session cookies or other third-party credentials (for example, to facilitate automatic entry into Roblox groups), they understand and accept the risks associated with such practice. PEEK STORE uses this information exclusively during the order delivery process and proceeds to invalidate or delete it once the operation is complete. PEEK STORE is not responsible for subsequent modifications that the holder makes to their credentials, nor for the use that Roblox Corporation or any third party may make of them.\"},\"s12\":{\"title\":\"12. Support Limitation and Suspension\",\"intro\":\"The PEEK STORE support team may deny, pause, or suspend service in the following cases:\",\"items\":[\"Harassment, insults, threats, or inappropriate language toward staff\",\"Spam or abuse of the ticket system\",\"Multiple duplicate tickets on the same matter\",\"Behavior that violates these Terms and Conditions\"],\"p2\":\"In addition, support may be temporarily suspended in case of scheduled maintenance or high demand. PEEK STORE is not responsible for delays in service during these periods.\"},\"s13\":{\"title\":\"13. Consent and Knowledge of How the Service Works\",\"intro\":\"By creating an order in PEEK STORE, the customer declares that:\",\"items\":[\"They understand how the delivery methods work (Group, Gamepass, In-Game)\",\"They understand that delivery times are estimates and may vary\",\"They are aware of the risks associated with each delivery method\",\"They voluntarily and consciously accept all the terms and conditions established here\",\"They acknowledge having fully read and understood this document before making any purchase\"]},\"s14\":{\"title\":\"14. Dispute Resolution Procedure\",\"p1\":\"Before opening a claim with PayPal, a bank, payment gateway, or other financial entity, the customer is asked to\",\"p1Strong\":\"first contact PEEK STORE support\",\"p1End\":\"to attempt to resolve the situation directly in the shortest possible time.\",\"warningIntro\":\"Opening a claim or chargeback without first having exhausted the support channel, or doing so based on false or misrepresented facts, may be considered misuse and result in:\",\"warningItems\":[\"Suspension of the order in question\",\"Permanent blocking of the PEEK account\",\"Withholding of related internal balance\",\"Submission of delivery evidence to the payment gateway\",\"Exercise of any applicable legal actions\"]},\"s15\ xpulsion from the channels\",\"Suspension of access to support\",\"In serious cases, permanent blocking of the account\"],\"p2\":\"Mistreatment of support staff may result in the temporary or permanent freezing of customer service for that account.\"},\"s19\":{\"title\":\"19. Acceptance of Terms\",\"p1\":\"By using the PEEK STORE service, the customer confirms that they have read, understood, and accepted all the terms and conditions established here. Continued use of our services implies acceptance of any future updates to these terms.\"},\"s20\":{\"title\":\"20. Applicable Law and Jurisdiction\",\"p1\":\"These Terms and Conditions are governed and construed in accordance with the laws of the State of\",\"p1Strong\":\"Wyoming, United States of America\",\"p1End\":\", without application of its conflict of laws rules. Any dispute shall be submitted to the jurisdiction of the competent federal or state courts located in said State, without prejudice to the mandatory consumer protection rules of the customer's country of residence when applicable.\"},\"s21\":{\"title\":\"21. Force Majeure\",\"intro\":\"PEEK STORE shall not be liable for delays or breaches caused by force majeure circumstances, such as:\",\"items\":[\"Massive failures in Roblox servers\",\"Network interruptions\",\"Natural disasters\",\"Power outages\",\"Failures of external providers\",\"Events outside our control\"]},\"s22\":{\"title\":\"22. Intellectual Property\",\"p1\":\"The peekstore.com site, its design, code, graphics, logos, and the commercial name PEEK are the exclusive property of PEEK DIGITAL LLC or have been lawfully licensed for its use. Reproduction, distribution, reverse engineering, or commercial use without prior written authorization from PEEK DIGITAL LLC is prohibited. Third-party trademarks mentioned on the site (Roblox®, PayPal®, Mercado Pago®, among others) belong to their respective owners and are used solely for descriptive purposes under nominative fair use.\"},\"s23\":{\"title\":\"23. Copyright Infringement Notices (DMCA)\",\"p1\":\"In accordance with the Digital Millennium Copyright Act (17 U.S.C. § 512), copyright holders who consider that content published on our site infringes their rights may send a notification to the email:\",\"email\":\"contacto@peekstore.com\",\"p2\":\"The notification must include: (i) physical or electronic signature of the holder or authorized person; (ii) identification of the protected work; (iii) identification of the allegedly infringing material and its location; (iv) contact details of the claimant; (v) good faith statement; (vi) statement under penalty of perjury regarding the accuracy of the information and the holder's representation. PEEK STORE will address valid notifications in accordance with the DMCA procedure.\"},\"s24\":{\"title\":\"24. General Provisions\",\"intro\":\"Additional operational clauses applicable to these Terms:\",\"items\":[\"Severability: if any provision of these Terms is declared null or unenforceable by a competent authority, the rest will remain in full force.\",\"No waiver: failure to exercise a right by PEEK STORE does not constitute a waiver of it.\",\"Assignment: the customer may not assign their rights or obligations under these Terms without the prior written authorization of PEEK STORE; PEEK DIGITAL LLC may assign its own rights to its affiliates or successors.\",\"Entire agreement: these Terms, together with the Privacy Policy, constitute the entire agreement between the parties and replace any prior understanding.\",\"Language: in case of discrepancy between the Spanish version of these Terms and their translations to other languages, the Spanish version will prevail.\"]},\"s25\":{\"title\":\"25. Right of Withdrawal\",\"p1\":\"The right of withdrawal may apply only in cases where the legislation of the consumer's country of residence so establishes and provided that the service has not started its execution.\",\"p2\":\"The customer acknowledges and accepts that the products offered by PEEK STORE correspond to digital content and services of immediate execution or that require active coordination for their delivery. In accordance with the exceptions provided in most applicable consumer laws (including, among others, Art. 47 of Law 1480 of 2011 of Colombia, Art. 16(m) of Directive 2011/83/EU, Art. 49 of the Brazilian Consumer Defense Code, and equivalent rules), the right of withdrawal may not be applicable once the service execution has begun with the customer's prior consent.\",\"p3\":\"If the withdrawal proceeds in accordance with applicable law and provided that the service has not started its execution, the refund will be made as established in section 4 (Refunds) of these Terms.\",\"p4\":\"By confirming and paying for an order, the customer gives express consent for the immediate execution of the service and acknowledges that, once said execution has begun, they will lose their right of withdrawal to the extent permitted by applicable law.\"},\"s26\":{\"title\":\"26. Promotions and Entertainment Features\",\"intro\":\"PEEK STORE may offer recreational features within the platform (such as Mines, Roulette, reward boxes, or other similar dynamics). These features are governed by the following conditions:\",\"items\":[\"The rewards obtained are exclusively discount coupons, PEEK wallet credits, or other benefits with no monetary value outside the platform.\",\"These features do not constitute regulated games of chance, do not involve real money betting, nor the possibility of winning cash.\",\"Participation is free; no purchase or financial outlay is required to access them.\",\"Rewards are not transferable, sellable, or exchangeable for money.\",\"PEEK STORE may modify, suspend, or cancel these features at any time for technical, operational, or legal reasons.\"],\"restrictionsLabel\":\"Territorial restrictions:\",\"restrictions\":\"Access to these features may be restricted or suspended in jurisdictions where local legislation so requires. PEEK STORE does not guarantee universal availability and disclaims liability for access from jurisdictions where their use is restricted.\",\"abuseLabel\":\"Abusive use:\",\"abuse\":\"Any attempt at manipulation, automation, exploitation of technical failures, or fraudulent use of these features will result in the loss of obtained rewards, the blocking of the account, and, where applicable, the corresponding legal actions.\"},\"s27\":{\"title\":\"27. Contests, Events and Promotions with Prizes\",\"intro\":\"PEEK STORE may periodically organize contests, promotional events, or sweepstakes with prizes in balance, products, or, in specific cases, cash. Each contest is governed by the following general conditions:\",\"items\":[\"Each contest will publish specific rules (mechanics, dates, eligibility criteria, prizes, and award method) that will prevail in matters not provided for by these Terms.\",\"Participation is voluntary and, as a general rule, free; no purchase will be required to participate unless the rules so indicate and local legislation permits it.\",\"Prizes are not transferable or exchangeable for other products or services unless the contest rules expressly allow it.\",\"For prizes whose value exceeds two hundred US dollars (USD 200) or the legally applicable equivalent in the winner's jurisdiction, PEEK STORE may require identity verification (KYC) prior to delivery.\",\"Taxes, withholdings, or fiscal charges arising from the prize are the sole responsibility of the winner in accordance with the legislation of their country of residence.\",\"Contests are open only to residents of the countries expressly listed in the rules. Unless otherwise indicated, participation by minors under eighteen (18) years of age or persons with limited legal capacity is excluded.\",\"PEEK STORE reserves the right to disqualify any participant who engages in fraud, manipulation, impersonation, or non-compliance with the rules.\",\"PEEK STORE may cancel, modify, or suspend a contest for justified cause, including legal, technical, or force majeure reasons, communicating it through official channels.\"]},\"s28\":{\"title\":\"28. User Account and PEEK Wallet\",\"intro\":\"Use of PEEK STORE may require the creation of a user account. The PEEK wallet is an internal balance system associated with the customer's account, subject to the following conditions:\",\"items\":[\"The PEEK wallet balance is for exclusive use within the platform and represents credits for future purchases of products and services offered by PEEK STORE.\",\"The PEEK wallet balance does not constitute cash, does not generate interest, and is not convertible to fiat currency or transferable to other users or external accounts, unless applicable law or an express decision by PEEK STORE indicates otherwise.\",\"The customer is responsible for maintaining the confidentiality of their access credentials. Any activity carried out from their account is presumed to be authorized by the holder.\",\"PEEK STORE may apply additional security checks (confirmation email, second factor, captcha, manual validation) when deemed necessary to protect the account or balance.\",\"Accounts without login activity for twenty-four (24) consecutive months may be administratively archived. The wallet balance will remain preserved and may be claimed by the holder by contacting support; no balance expiration will apply unless applicable law expressly permits it.\",\"The customer may request the closure of their account at any time; the remaining balance must be used before closure or, failing that, may be lost upon confirmation of closure, except for the legal right of refund in force in accordance with section 4.\"]},\"s29\":{\"title\":\"29. Bans, Restrictions and Fraud Detection\",\"intro\":\"To protect the integrity of the platform, prevent fraud, and comply with applicable legislation, PEEK STORE uses technical detection systems that may include:\",\"items\":[\"Analysis of IP, approximate geolocation, and behavioral patterns.\",\"Technical device identifiers (device fingerprint), including browser characteristics, operating system, resolution, and technical configurations.\",\"Cross-verification of order and payment data with the gateway used.\",\"Automated rules and manual review by the support and antifraud team.\"],\"consequencesIntro\":\"If misuse, fraud risk, or breach of these Terms is detected, PEEK STORE may:\",\"consequences\":[\"Temporarily suspend the account or the order in question.\",\"Permanently block the account and, where appropriate, other accesses associated with the same device.\",\"Withhold the related internal balance for the duration of the investigation.\",\"Deny access to the service without this constituting a contractual breach.\"],\"appealLabel\":\"Appeal procedure:\",\"appeal\":\"The customer whose account has been restricted may appeal the decision by writing to contacto@peekstore.com indicating the reason and providing the information they consider relevant. PEEK STORE will evaluate the appeal within a reasonable period and communicate the resolution through the same channel.\"},\"s30\":{\"title\":\"30. Reviews and User Generated Content (UGC)\",\"intro\":\"Users may publish reviews, comments, and other content within the platform. By doing so, the user accepts the following:\",\"items\":[\"Grants PEEK STORE a worldwide, non-exclusive, royalty-free, transferable, and sublicensable license to use, reproduce, display, adapt, translate, and distribute such content on the platform and in related promotional materials.\",\"Warrants that the content is original, does not infringe third-party rights, and does not contain sensitive personal information about themselves or third parties.\",\"Agrees not to publish false, misleading, offensive, discriminatory, illegal, sexually explicit, defamatory content, that incites hatred, or that violates the platform's terms of use.\",\"Acknowledges that PEEK STORE may moderate, edit, or delete the content without prior notice if it considers that it infringes these rules or applicable legislation.\",\"Accepts that non-compliance may result in the deletion of the content, suspension of the account, or, in serious cases, legal actions.\"]},\"s31\":{\"title\":\"31. Minimum Age and Legal Capacity\",\"p1\":\"PEEK STORE services are directed to people over thirteen (13) years of age. Minors between thirteen (13) and eighteen (18) years (or the age of legal majority in their jurisdiction) may use the service only with authorization and under the supervision of their legal representative, who assumes full responsibility for purchases and activities carried out from said account.\",\"p2\":\"Certain platform features, including contests with cash prizes or specific promotions, may be restricted to users over eighteen (18) years of age or to the minimum age required by applicable legislation. Specific restrictions will be indicated in each feature or contest.\",\"p3\":\"If PEEK STORE detects that a user under the permitted age has used the service without the required authorization, it may suspend the account and, at the request of the legal representative, proceed with the refund in accordance with section 4 of these Terms.\"},\"footer\":{\"disclaimer\":\"PEEK STORE reserves the right to modify these Terms and Conditions at any time. Substantial changes will be notified at least fifteen (15) days in advance through visible notice on the website or by email when possible. It is the customer's responsibility to review them periodically. Continued use of the service after the effective date of the changes implies acceptance of them.\",\"lastUpdated\":\"Last updated: April 25, 2026\"}},\"privacidad\":{\"headerTitle1\":\"Privacy \",\"headerTitle2\":\"Policy\",\"headerSubtitle\":\"How we collect, use, and protect your information at PEEK STORE.\",\"lastUpdatedHeader\":\"Last updated: April 25, 2026\",\"s1\":{\"title\":\"1. Introduction and Data Controller\",\"p1\":\"This Privacy Policy applies to the peekstore.com site and associated services, operated by PEEK DIGITAL LLC (PEEK DIGITAL Limited Company), a company organized under the laws of the State of Wyoming, United States of America, with mailing address at 1007 N Orange St., 4th Floor, Suite 5386, Wilmington, DE 19801, USA, and email contacto@peekstore.com. For the purposes of this policy, PEEK DIGITAL LLC acts as the controller of its users' personal data.\",\"p2\":\"At PEEK STORE we are committed to protecting your privacy. This Policy describes what data we collect when you use our digital store (digital products and services such as Robux), how we use it, with whom we share it, and what rights you have. PEEK STORE is an independent digital store and is not affiliated, associated, or endorsed by Roblox Corporation.\"},\"s2\":{\"title\":\"2. Data we collect\",\"intro\":\"We collect only the data necessary to provide the service, process payments, prevent fraud, and comply with the law. Below we detail the categories:\",\"tableHeaders\":[\"Category\",\"Examples\",\"Purpose\"],\"rows\":[[\"Account\",\"Email, name or username, login provider (e.g. Google, Discord)\",\"Identification, authentication, and access\"],[\"Purchase\",\"Order, product, amount, currency, status, payment method and processor\",\"Processing, delivery, and support\"],[\"Billing and payment\",\"Name, address, country, tax information when applicable\",\"Legal compliance and payment processing\"],[\"Technical\",\"IP, cookies, device type, browser, operating system, usage events\",\"Security, fraud prevention, and analytics\"],[\"Device identifiers\",\"Browser fingerprint (canvas, WebGL, audio, fonts, plugins, time zone, language)\",\"Fraud prevention and detection of multiple accounts\"],[\"Optional third-party credentials\",\"Roblox session cookie (.ROBLOSECURITY) and/or Discord token when the customer chooses to share them\",\"Solely to automate order delivery when the customer authorizes it\"],[\"Security data\",\"Encrypted TOTP secrets (when applicable to internal systems)\",\"Account and internal operations protection\"],[\"Support\",\"Messages, tickets, conversation history, attachments\",\"Customer service\"],[\"User content\",\"Reviews, comments, and posts\",\"Display opinions and improve the offering\"]]},\"s3\":{\"title\":\"3. How we use the data\",\"intro\":\"We use your data to:\",\"items\":[{\"label\":\"Product delivery:\",\"text\":\"process orders and deliver Robux or digital services\"},{\"label\":\"Support:\",\"text\":\"handle queries, claims, and tickets\"},{\"label\":\"Fraud prevention:\",\"text\":\"detect and prevent misuse, false chargebacks, duplicate accounts, and promotion abuse\"},{\"label\":\"Analytics:\",\"text\":\"improve the website, performance, and user experience\"},{\"label\":\"Marketing and communications:\",\"text\":\"send abandoned cart reminders, offers, and news in accordance with the applicable legal basis\"},{\"label\":\"Legal compliance:\",\"text\":\"when required by law or to defend rights in case of claim\"}]},\"s4\":{\"title\":\"4. Legal basis and consent\",\"p1\":\"We process your data based on the consent you give us when registering and accepting this policy, on the performance of the contract (provision of the purchase and delivery service), on legitimate interest (security, analytics, fraud prevention, service improvement) and, where applicable, on compliance with legal obligations. You may withdraw your consent at any time by contacting us; this will not affect the lawfulness of prior processing.\"},\"s5\":{\"title\":\"5. Cookies, Pixels and Tracking Technologies\",\"intro\":\"We use cookies and similar technologies classified into the following categories:\",\"items\":[{\"label\":\"Essential:\",\"text\":\"indispensable for the operation of the site (session, authentication, CSRF prevention). They do not require consent.\"},{\"label\":\"Functional:\",\"text\":\"remember user preferences (language, currency, configuration). They improve the experience without being indispensable.\"},{\"label\":\"Analytics:\",\"text\":\"measure the use of the site to improve performance and experience. May include anonymized or pseudonymized data.\"},{\"label\":\"Marketing:\",\"text\":\"allow displaying relevant advertising and measuring campaigns. They include Facebook Pixel, Google Ads, and similar tools. They require prior consent where the law so requires (European Economic Area, United Kingdom, Brazil, and other applicable jurisdictions).\"},{\"label\":\"Anti-fraud:\",\"text\":\"include Cloudflare Turnstile (captcha) and device fingerprinting techniques, used exclusively to protect the platform against fraud, abuse, or automated attacks.\"}],\"consentLabel\":\"Consent management:\",\"consent\":\"Where applicable law requires it, we will display a consent banner that allows accepting, rejecting, or individually configuring non-essential cookies. You may revoke your consent at any time from your browser settings or from the site preferences section when available.\"},\"s6\":{\"title\":\"6. Sharing data with third parties and sub-processors\",\"intro\":\"We share data only when necessary with the following sub-processors and provider categories:\",\"items\":[{\"label\":\"Vercel Inc. (USA):\",\"text\":\"website hosting, edge network, and observability.\"},{\"label\":\"Supabase Inc. (USA):\",\"text\":\"authentication, database, storage, and serverless functions.\"},{\"label\":\"Stripe, Inc. (USA):\",\"text\":\"card payment processing and associated methods.\"},{\"label\":\"PayPal Holdings, Inc. (USA):\",\"text\":\"PayPal payment processing.\"},{\"label\":\"Mercado Pago / MercadoLibre (Argentina/International):\",\"text\":\"payment processing in Latin America.\"},{\"label\":\"Cryptomus:\",\"text\":\"cryptocurrency payment processing.\"},{\"label\":\"NowPayments OÜ (Estonia):\",\"text\":\"cryptocurrency payment processing.\"},{\"label\":\"Resend Inc. (USA):\",\"text\":\"transactional email and notification delivery.\"},{\"label\":\"Discord Inc. (USA):\",\"text\":\"optional authentication, notifications, and support functionalities linked to Discord.\"},{\"label\":\"Cloudflare, Inc. (USA):\",\"text\":\"anti-bot protection (Turnstile), CDN, and attack mitigation.\"},{\"label\":\"Google LLC (USA):\",\"text\":\"optional authentication with Google account and, where applicable, analytical and advertising tools.\"},{\"label\":\"Meta Platforms, Inc. (USA):\",\"text\":\"where applicable, measurement of advertising campaigns through Pixel.\"}],\"p2\":\"These third parties process the data in accordance with their own policies and applicable law, under appropriate contractual agreements (including data processing clauses where required). PEEK STORE does not sell personal information.\",\"updatesLabel\":\"Updates:\",\"updates\":\"The list of sub-processors may be updated from time to time. Substantial changes will be reflected in this policy with the date of last update.\"},\"s7\":{\"title\":\"7. Data Retention\",\"intro\":\"We retain your data for the periods necessary to fulfill the purposes described, applicable legal obligations, and the exercise or defense of claims. Indicative periods:\",\"items\":[{\"label\":\"Active account data:\",\"text\":\"as long as the account remains active or its deletion is not requested.\"},{\"label\":\"Closed account data:\",\"text\":\"up to twelve (12) months after closure, except for higher legal retention obligation.\"},{\"label\":\"Order and billing data:\",\"text\":\"between five (5) and ten (10) years in accordance with the accounting and tax obligations of the applicable country.\"},{\"label\":\"Support tickets and messages:\",\"text\":\"up to twenty-four (24) months after ticket closure.\"},{\"label\":\"Technical and security logs:\",\"text\":\"between six (6) and twelve (12) months, with the possibility of longer retention when necessary to investigate incidents.\"},{\"label\":\"Optional third-party credentials (Roblox cookies, Discord tokens):\",\"text\":\"deleted or invalidated after completing the operation that motivated their delivery, within a period not exceeding seventy-two (72) hours.\"},{\"label\":\"Cookies and marketing data:\",\"text\":\"according to the duration indicated in the consent banner; can be revoked at any time.\"}],\"p2\":\"After the applicable periods, the data is deleted, irreversibly anonymized, or kept solely for aggregate statistical purposes without the possibility of identification.\"},\"s8\":{\"title\":\"8. Security\",\"p1\":\"We apply appropriate technical and organizational measures to protect your data against unauthorized access, loss, alteration, or disclosure: encryption in transit, role-based access control, secure environments, access logging, and periodic review of practices. No system is foolproof; if you detect an incident, contact us immediately at contacto@peekstore.com.\"},\"s9\":{\"title\":\"9. User Rights\",\"p1\":\"You have the right to access your data, rectify it if incorrect, request its deletion (when we should not retain it by law), object to certain processing, limit the processing and, where applicable, to data portability.\",\"p1Strong\":\"You can request the permanent deletion of your account and associated data.\",\"p1End\":\"To exercise these rights, contact us at contacto@peekstore.com or through the channels indicated in the Contact section. We will respond within the period established by the applicable law according to your place of residence.\"},\"s10\":{\"title\":\"10. Minors\",\"p1\":\"Our services are not directed to children under 13 years of age.\",\"p1Strong\":\"We do not intentionally collect personal data from children under 13 years of age in accordance with the Children's Online Privacy Protection Act (COPPA) of the United States.\",\"p1End\":\"Minors between 13 and 18 years (or the age of majority in their jurisdiction) may only use the service with authorization and under the supervision of their legal representative. Certain features (contests with cash prizes, specific promotions) may require legal age. If you are a parent or guardian and consider that a minor has provided us with data without your authorization, contact us at contacto@peekstore.com to request its deletion.\"},\"s11\":{\"title\":\"11. International Transfers\",\"p1\":\"PEEK DIGITAL LLC operates from the United States of America. By using our services you understand and accept that your data will be processed and stored in the United States and, through our providers, in other jurisdictions. When your data is transferred from the European Economic Area, United Kingdom, or other jurisdictions with data protection laws, we will apply recognized safeguards (Standard Contractual Clauses, adequacy decisions, or equivalent mechanisms) to ensure an adequate level of protection.\"},\"s12\":{\"title\":\"12. Changes to this Policy\",\"p1\":\"We may update this Privacy Policy from time to time. Substantial changes will be notified at least fifteen (15) days in advance through notice on the website or by email when possible. The «Last updated» date at the top of the document indicates the latest revision. Continued use of the service after the changes take effect implies acceptance of the updated policy.\"},\"s13\":{\"title\":\"13. Contact\",\"intro\":\"To exercise your rights, queries about this policy, or any matter related to your personal data, you can contact us by:\",\"discordLabel\":\"Discord:\",\"discordText\":\"support channel (#soporte) on our official server.\",\"emailLabel\":\"Email:\",\"emailAddress\":\"contacto@peekstore.com\",\"addressLabel\":\"Mailing address:\",\"address\":\"PEEK DIGITAL LLC — 1007 N Orange St., 4th Floor, Suite 5386, Wilmington, DE 19801, USA\",\"p2\":\"We will respond within a reasonable time according to the nature of your request and in accordance with the applicable legal deadline.\"},\"s14\":{\"title\":\"14. California Residents (CCPA/CPRA)\",\"p1\":\"If you are a California resident, in accordance with the California Consumer Privacy Act (CCPA) and the California Privacy Rights Act (CPRA) you have the right to:\",\"items\":[\"Know what categories of personal information we collect and their purposes\",\"Request a copy of the personal information we have about you\",\"Request the deletion of your personal information\",\"Correct inaccurate personal information\",\"Object to the sale or assignment of your personal information (PEEK STORE does not sell personal information)\",\"Not be discriminated against for exercising these rights\"],\"p2\":\"To exercise any of these rights, write to us at contacto@peekstore.com indicating your request. We will reasonably verify your identity before responding.\"},\"s15\":{\"title\":\"15. EEA and UK Residents (GDPR / UK GDPR)\",\"p1\":\"If you are in the European Economic Area, Switzerland, or United Kingdom, we recognize the rights provided in the General Data Protection Regulation (GDPR) and UK GDPR: access, rectification, erasure («right to be forgotten»), limitation of processing, portability, opposition and not to be subject to significant automated decisions.\",\"p2\":\"The legal bases of processing are: contractual performance (process your order), consent (non-essential cookies and communications), legitimate interest (security, fraud prevention, service improvement) and compliance with legal obligations. You may withdraw your consent at any time without affecting the lawfulness of prior processing.\",\"p3\":\"You have the right to file a complaint with the supervisory authority of your country (for example, AEPD in Spain, CNIL in France, ICO in the United Kingdom).\"},\"s16\":{\"title\":\"16. Brazil Residents (LGPD)\",\"p1\":\"If you are in Brazil, we recognize the rights provided in the Lei Geral de Proteção de Dados (Lei nº 13.709/2018):\",\"items\":[\"Confirmation of the existence of processing.\",\"Access to the data.\",\"Correction of incomplete, inaccurate, or outdated data.\",\"Anonymization, blocking, or deletion of unnecessary data or data processed in non-compliance with the LGPD.\",\"Portability to another service provider.\",\"Deletion of data processed with consent, except for legal retention obligation.\",\"Information about the public or private entities with which the data is shared.\",\"Information about the possibility of not consenting and the consequences of refusal.\",\"Revocation of consent.\"],\"p2\":\"To exercise these rights, contact us at contacto@peekstore.com. You also have the right to file a complaint with the Autoridade Nacional de Proteção de Dados (ANPD).\"},\"s17\":{\"title\":\"17. Colombia Residents (Law 1581 of 2012 — Habeas Data)\",\"p1\":\"If you are in Colombia, in accordance with Law 1581 of 2012, its regulatory decrees, and other applicable personal data protection regulations, we recognize the following rights:\",\"items\":[\"Know, update, and rectify your personal data.\",\"Request proof of the authorization granted for processing.\",\"Be informed about the use that has been given to your personal data.\",\"File complaints with the Superintendencia de Industria y Comercio (SIC) for infractions of the law.\",\"Revoke authorization or request the deletion of data when legal principles, rights, and guarantees are not respected.\",\"Free access to personal data that has been subject to processing.\"],\"p2\":\"To exercise these rights you can write to contacto@peekstore.com indicating your request. PEEK STORE will respond within the periods provided by Colombian law.\"},\"s18\":{\"title\":\"18. Marketing Communications and Abandoned Cart\",\"intro\":\"PEEK STORE may send promotional communications by email or other channels:\",\"items\":[\"Abandoned cart reminders, offers, discounts, product announcements, and news.\",\"Notifications of events, contests, and promotions.\"],\"legalLabel\":\"Legal basis:\",\"legal\":\"Promotional communications are made in accordance with customer consent or legitimate interest, depending on the jurisdiction. In the European Economic Area, United Kingdom, Brazil, and other jurisdictions that require it, we will require prior verifiable consent.\",\"optoutLabel\":\"Unsubscribe:\",\"optout\":\"All promotional communications include an unsubscribe link that allows revoking consent with a single click. You can also request unsubscription by writing to contacto@peekstore.com. Strictly transactional communications (order confirmation, support, legal or security notices) will continue to be sent while the account remains active.\"},\"s19\":{\"title\":\"19. Internal Access to Data\",\"p1\":\"Only authorized PEEK STORE personnel access personal data and always under the principle of least privilege: each role (administration, support, moderation, antifraud team) accesses only the information strictly necessary for their functions.\",\"p2\":\"Accesses are logged and monitored. Personnel are subject to confidentiality obligations and internal sanctions in case of misuse. PEEK STORE may revoke accesses at any time upon suspicion or evidence of non-compliance.\"},\"s20\":{\"title\":\"20. Security Breach Notification\",\"p1\":\"In the event of detecting a security breach that significantly affects users' personal data, PEEK STORE will notify the competent authority(ies) and, where appropriate, the affected users, without undue delay and, when GDPR or LGPD applies, within seventy-two (72) hours of becoming aware of the breach.\",\"p2\":\"The notification to users will include, to the extent possible, the nature of the incident, the categories of data affected, the possible consequences, and the measures adopted or proposed to mitigate the effects. Communications will be made by email, visible notice on the website, or other means proportional to the risk.\"},\"s21\":{\"title\":\"21. Device Identifiers and Antifraud\",\"p1\":\"To protect the integrity of the platform and prevent fraud, PEEK STORE generates a technical identifier (device fingerprint) from characteristics of the user's browser and device, such as canvas configuration, WebGL, audio, installed fonts, plugins, time zone, language, and screen resolution.\",\"p2\":\"This identifier is used solely for security purposes, fraud prevention, detection of duplicate accounts, and application of the Terms and Conditions. It is not used to profile the user for advertising purposes or assigned to third parties for commercial purposes.\",\"p3\":\"The customer may object to this processing; however, this may imply restrictions on access to the service or to certain features for security reasons. The legal basis of this processing is PEEK STORE's legitimate interest in protecting its service and its users from fraud.\"},\"footer\":{\"closing\":\"Thank you for trusting PEEK STORE. Your privacy is important to us.\",\"lastUpdated\":\"Last updated: April 25, 2026\"}}},\"minas\":{\"title\":\"Peek Minas\",\"subtitle\":\"Find gems, win discounts\",\"howItWorks\":\"How does it work?\",\"loading\":\"Loading...\",\"attempts\":\"Attempts\",\"gems\":\"Gems\",\"discount\":\"Discount\",\"alreadyPlayed\":\"You already played today\",\"resetsAutomatically\":\"Resets automatically\",\"accumulated\":\"accumulated\",\"nextGem\":\"Next gem\",\"keepOrRisk\":\"Keep your discount or keep risking?\",\"claim\":\"Claim\",\"keepPlaying\":\"Continue\",\"playAgain\":\"Play again\",\"shop\":\"Shop\",\"cell\":\"Cell {number}\",\"gem\":\"Gem\",\"mine\":\"Mine\",\"close\":\"Close\",\"tutorial\":{\"step1\":{\"title\":\"The board\",\"desc\":\"25 tiles with 5 hidden mines and 20 gems. Tap one to start.\"},\"step2\":{\"title\":\"Find gems\",\"desc\":\"Each gem you discover increases your discount. Collect up to 5.\"},\"step3\":{\"title\":\"Watch out for mines\",\"desc\":\"If you hit a mine, you lose all accumulated discount.\"},\"step4\":{\"title\":\"Increase your discount\",\"desc\":\"From 1% to 7% depending on how many gems you find. The bar shows your progress.\"},\"step5\":{\"title\":\"Claim or r
